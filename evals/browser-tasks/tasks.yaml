    Go to https://investor.apple.com/investor-relations/default.aspx and
    extract the headline from the most recent investor news item.
  starting_url: https://investor.apple.com/investor-relations/default.aspx
  step_cap: 10
  token_cap: 15000
  wall_clock_cap_s: 240
  success_criteria:
    - type: contains
      field: extracted
      value: "Apple"
  negative_oracle:
