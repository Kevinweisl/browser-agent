  starting_url: https://docs.python.org/3/library/asyncio.html
  step_cap: 10
  token_cap: 15000
  wall_clock_cap_s: 180
  success_criteria:
    - type: contains
      field: extracted
      value: "Task"
  negative_oracle:
    must_appear_on_final_page:
      - "asyncio"
    must_not_appear:
      - "404"

- task_id: gen-004
  pack: generic
  domain: form
  difficulty: medium
