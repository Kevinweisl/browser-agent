# Task 2 browser-agent eval set.
#
# Two packs:
#   - generic    — public sites, no auth, demonstrate cross-domain coverage
#   - finance    — investor-relations / public filings, the integration narrative
#
# Constraints per task:
#   step_cap        — hard cap on total Actor steps (across initial plan + replans)
#   token_cap       — soft cap, tracked but not enforced (informational)
#   wall_clock_cap_s
#   success_criteria — list of {type: contains|regex, field: text|extracted, value: ...}
#   negative_oracle  — must_appear_on_final_page + must_not_appear (substring match)
#
# Methodology adapted from research delta §6: negative oracle pass rate is the
# primary cheap signal; ariaSnapshot match is the secondary; LLM-judge is the
# tiebreak for ambiguous results.

# ─── generic pack ────────────────────────────────────────────────────────────
- task_id: gen-001
  pack: generic
  domain: wiki
  difficulty: easy
  nl_description: |
    Go to https://en.wikipedia.org/wiki/Battle_of_Hastings and find the
    casualties section. Return a one-line answer with the rough death toll
    figures listed for both sides.
  starting_url: https://en.wikipedia.org/wiki/Battle_of_Hastings
  step_cap: 8
  token_cap: 12000
  wall_clock_cap_s: 180
  success_criteria:
    - type: contains
      field: extracted
      value: "Hastings"
  negative_oracle:
    must_appear_on_final_page:
      - "Battle of Hastings"
    must_not_appear:
      - "Wikipedia does not have an article"

- task_id: gen-002
  pack: generic
  domain: wiki
  difficulty: easy
  nl_description: |
    Go to https://en.wikipedia.org/wiki/Main_Page and report the total
    number of articles in English Wikipedia (the figure shown on the Main
    Page).
  starting_url: https://en.wikipedia.org/wiki/Main_Page
  step_cap: 6
  token_cap: 10000
  wall_clock_cap_s: 150
  success_criteria:
    - type: regex
      field: extracted
      value: '\d{1,3}([,]\d{3})+'
  negative_oracle:
    must_appear_on_final_page:
      - "Main Page"
    must_not_appear:
      - "page not found"

