      field: extracted
      value: "Example Domain"
  negative_oracle:
    must_appear_on_final_page:
      - "Example Domain"
    must_not_appear:
      - "page not found"

- task_id: gen-005
  pack: generic
  domain: search
  difficulty: medium
  nl_description: |
    Go to https://en.wikipedia.org and use the search to look up
