    Go to https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0000320193&type=10-K&dateb=&owner=include&count=40 and report the
    accession number of the most recent 10-K filing.
  starting_url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0000320193&type=10-K&dateb=&owner=include&count=40
  step_cap: 8
  token_cap: 15000
  wall_clock_cap_s: 180
  success_criteria:
    - type: regex
      field: extracted
      value: '\d{10}-\d{2}-\d{6}'
  negative_oracle:
    must_appear_on_final_page:
      - "10-K"
    must_not_appear:
      - "no matching"
      - "page not found"

